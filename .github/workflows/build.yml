name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5
        with:
          path: "src"

      - name: Prepare Builds Branch
        working-directory: ${{ github.workspace }}/src
        run: |
          git fetch origin builds || true
          if git show-ref --verify --quiet refs/remotes/origin/builds; then
            git worktree add $GITHUB_WORKSPACE/builds origin/builds
          else
            mkdir -p $GITHUB_WORKSPACE/builds
            cd $GITHUB_WORKSPACE/builds
            git init
            git checkout --orphan builds
            git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          fi

      - name: Clean old builds
        run: |
          rm $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm $GITHUB_WORKSPACE/builds/*.jar || true

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt
          cache: gradle

      - name: Setup Android SDK
        run: |
          # Pre-accept SDK licenses
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "e6b7c2ab7fa2298c15165e9583d0222b24b9a7e" >> $ANDROID_HOME/licenses/android-sdk-license
          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Install only platform-tools (no emulator)
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" || true

      - name: Build Plugins
        working-directory: ${{ github.workspace }}/src
        env:
          DUBBINDO_PASSWORD: ${{ secrets.DUBBINDO_PASS }}
          DUBBINDO_USERNAME: ${{ secrets.DUBBINDO_USER }}
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson
          # Copy all .cs3 files except SharedModule
          find . -path "*/build/*.cs3" ! -name "SharedModule.cs3" -exec cp {} ${{ github.workspace }}/builds/ \;
          # Copy plugins.json and remove SharedModule entry if present
          cp build/plugins.json ${{ github.workspace }}/builds/
          if [ -f "${{ github.workspace }}/builds/plugins.json" ]; then
            python3 -c "
          import json, sys
          with open('${{ github.workspace }}/builds/plugins.json', 'r') as f:
              data = json.load(f)
          if 'plugins' in data:
              data['plugins'] = [p for p in data['plugins'] if 'SharedModule' not in p.get('url', '') and 'SharedModule' not in p.get('name', '')]
          with open('${{ github.workspace }}/builds/plugins.json', 'w') as f:
              json.dump(data, f, indent=2)
          " || echo "python3 not available, skipping SharedModule cleanup from plugins.json"
          fi

      - name: Push builds
        working-directory: ${{ github.workspace }}/builds
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git add .
          
          if git diff --staged --quiet; then
            echo "do not error if nothing to commit."
            exit 0
          fi
          
          git commit -m "Build ${{ github.sha }}"
          git push origin HEAD:builds --force
